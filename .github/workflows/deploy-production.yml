name: Deploy Production

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag to deploy (e.g. v1.2.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to deploy (e.g. v1.2.3)'
        required: true
        type: string

concurrency:
  group: deploy-production-${{ inputs.tag_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: 24.16.0
  PNPM_VERSION: 11.5.2

jobs:
  migrate_production_db:
    name: Migrate production DB
    uses: ./.github/workflows/migrate-production-db.yml
    with:
      tag_name: ${{ inputs.tag_name }}
    secrets: inherit

  deploy_production:
    name: Deploy production
    needs: migrate_production_db
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.production_url.outputs.production_url }}
    steps:
      - name: Check out released tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Archive dist artifact
        run: tar -czf dist.tar.gz dist/

      - name: Upload dist artifact to GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist.tar.gz --clobber

      - name: Set production URL
        id: production_url
        shell: bash
        env:
          PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: echo "production_url=https://${PROJECT_NAME}.trystan2k.workers.dev" >> "$GITHUB_OUTPUT"

      - name: Summarize production deployment
        env:
          PRODUCTION_URL: ${{ steps.production_url.outputs.production_url }}
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          {
            echo "## Production deployment"
            echo ""
            echo "- Release: $RELEASE_TAG"
            echo "- URL: $PRODUCTION_URL"
          } >> "$GITHUB_STEP_SUMMARY"
